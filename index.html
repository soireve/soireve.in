<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soiréve — Elevate Your Evening</title>

  <!-- Rich social preview for WhatsApp / iMessage / LinkedIn -->
  <meta property="og:title" content="Soiréve — Elevate Your Evening"/>
  <meta property="og:description" content="Luxury Bags. Festive Gifting. Crafted with Love in India."/>
  <meta property="og:image" content="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=375,fit=crop/MQUhxOZ2QV7c0xFK/untitled-design_20260223_022221_0000-B7cN3takjUxgpPRP.png"/>
  <meta property="og:url" content="https://links.soireve.in"/>
  <meta name="twitter:card" content="summary_large_image"/>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --gold: #c9a96e;
      --gold-glow: #c9a96e18;
      --gold-border: #c9a96e35;
      --cream: #f0ebe0;
      --cream-dim: #f0ebe060;
      --bg: #080808;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 56px 24px 48px;
      /* Warm luxury gradient background */
      background: radial-gradient(ellipse 120% 60% at 50% 0%, #1c1408 0%, #080808 55%);
      overflow-x: hidden;
    }

    /* Subtle animated grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }

    /* Staggered fade-up animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .a1 { animation: fadeUp 0.9s cubic-bezier(.22,.61,.36,1) 0.1s both; }
    .a2 { animation: fadeUp 0.9s cubic-bezier(.22,.61,.36,1) 0.25s both; }
    .a3 { animation: fadeUp 0.9s cubic-bezier(.22,.61,.36,1) 0.4s both; }
    .a4 { animation: fadeUp 0.9s cubic-bezier(.22,.61,.36,1) 0.55s both; }
    .a5 { animation: fadeUp 0.9s cubic-bezier(.22,.61,.36,1) 0.7s both; }

    /* Logo with gold halo glow */
    .logo-wrap {
      position: relative;
      margin-bottom: 28px;
    }
    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
    }
   

    /* Thin gold ornamental line */
    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      justify-content: center;
      margin: 4px 0 18px;
    }
    .ornament::before,
    .ornament::after {
      content: '';
      flex: 1;
      max-width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament::after { background: linear-gradient(90deg, var(--gold), transparent); }
    .ornament span {
      color: var(--gold);
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
    }

    h1 {
      font-size: 1.85rem;
      letter-spacing: 0.5em;
      font-weight: 300;
      color: var(--cream);
      text-indent: 0.5em; /* optical fix for letter-spacing */
    }

    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      font-weight: 200;
      text-transform: uppercase;
      margin: 10px 0 36px;
      text-indent: 0.3em;
    }

    /* New Launch badge — update seasonally */
    .badge {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-border);
      padding: 5px 14px;
      margin-bottom: 36px;
      font-weight: 300;
      background: var(--gold-glow);
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border: 1px solid var(--gold-border);
      color: var(--cream-dim);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      font-weight: 300;
      text-transform: uppercase;
      transition: color 0.4s ease, border-color 0.4s ease, background 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    /* Gold shimmer sweep */
    .links a::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.08), transparent);
      transition: left 0.6s ease;
    }
    .links a:hover::before { left: 150%; }
    .links a:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-glow);
    }

    /* Primary CTA - WhatsApp */
    .cta-primary {
      border-color: #25D36640 !important;
      background: linear-gradient(135deg, #0b1f0b, #060e06);
      color: #a8d5a8 !important;
    }
    .cta-primary:hover {
      border-color: #25D366 !important;
      color: #25D366 !important;
      background: #25D36610 !important;
    }

    /* Website CTA - slightly elevated */
    .cta-site {
      border-color: var(--gold-border);
      background: linear-gradient(135deg, #141008, #0a0a0a);
    }

    .icon { font-size: 0.9rem; }

    /* Section label above link groups */
    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      opacity: 0.5;
      text-transform: uppercase;
      font-weight: 300;
      margin: 20px 0 8px;
      align-self: flex-start;
      padding-left: 2px;
    }

    footer {
      margin-top: 52px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      color: var(--cream);
      opacity: 0.18;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

    </a>

    </a>

    <a href="tel:+919930555442">

    </a>
    <a href="mailto:info@soireve.in">

    </a>

  </div>

  <footer class="a5">© 2026 Soiréve &nbsp;·&nbsp; Crafted with love in India 🇮🇳</footer>

</div>
</body>
</html>
