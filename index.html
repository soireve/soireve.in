<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soiréve — Elevate Your Evening</title>

  <!-- Social Sharing Preview (WhatsApp, iMessage, LinkedIn) -->
  <meta property="og:title" content="Soiréve — Elevate Your Evening"/>
  <meta property="og:description" content="Luxury Bags. Festive Gifting. Crafted with Love in India."/>
  <meta property="og:image" content="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=375,fit=crop/MQUhxOZ2QV7c0xFK/untitled-design_20260223_022221_0000-B7cN3takjUxgpPRP.png"/>
  <meta property="og:url" content="https://links.soireve.in"/>
  <meta name="twitter:card" content="summary_large_image"/>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --gold: #c9a96e;
      --gold-dim: #c9a96e30;
      --cream: #f5f0e8;
      --bg: #0a0a0a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--bg);
      color: var(--cream);
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      /* Subtle noise texture via CSS */
      background-image: radial-gradient(ellipse at top, #1a1208 0%, #0a0a0a 60%);
    }

    /* Fade + rise animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* .logo {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease both;
    } */

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 16px auto;
      opacity: 0.6;
      animation: fadeUp 0.9s ease both;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.45em;
      font-weight: 300;
      color: var(--cream);
      animation: fadeUp 1s ease both;
    }

    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      opacity: 0.85;
      margin: 10px 0 36px;
      font-weight: 300;
      text-transform: uppercase;
      animation: fadeUp 1.1s ease both;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
      animation: fadeUp 1.2s ease both;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 24px;
      border: 1px solid var(--gold-dim);
      color: var(--cream);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      font-weight: 400;
      text-transform: uppercase;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    /* Gold shimmer fill on hover */
    .links a::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .links a:hover::before { transform: translateX(100%); }
    .links a:hover {
      border-color: var(--gold);
      color: var(--gold);
      letter-spacing: 0.25em;
    }

    .links a .icon { font-size: 1rem; }

    /* Primary CTA — WhatsApp stands out */
    .links a.cta {
      background: linear-gradient(135deg, #1a3a1a, #0d200d);
      border-color: #25D36660;
    }
    .links a.cta:hover { border-color: #25D366; color: #25D366; }

    footer {
      margin-top: 48px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--cream);
      opacity: 0.25;
      text-transform: uppercase;
      animation: fadeUp 1.4s ease both;
    }
  </style>
</head>
<body>

  <img
    class="logo"
    src="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=375,fit=crop/MQUhxOZ2QV7c0xFK/untitled-design_20260223_022221_0000-B7cN3takjUxgpPRP.png"
    alt="Soiréve Logo"
  />

  <div class="divider"></div>
  <h1>S O I R É V E</h1>
  <p class="tagline">Elevate Your Evening</p>

  <div class="links">
    <a class="cta" href="https://api.whatsapp.com/send/?phone=919930555442&text=Hi+Soireve%2C+I+want+to+see+your+collection%21&type=phone_number&app_absent=0">
      <span class="icon">💬</span> WhatsApp Us
    </a>
    <a href="https://soireve.in">
      <span class="icon">🌐</span> Visit Our Website
    </a>
    <a href="https://www.instagram.com/soireve.in/">
      <span class="icon">📸</span> Instagram
    </a>
    <a href="https://www.facebook.com/soireve.in/">
      <span class="icon">📘</span> Facebook
    </a>
    <a href="tel:+919930555442">
      <span class="icon">📞</span> Call Us
    </a>
    <a href="mailto:info@soireve.in">
      <span class="icon">📩</span> Email Us
    </a>
  </div>

  <footer>© 2026 Soiréve · Crafted with love in India 🇮🇳</footer>

</body>
</html>
